<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Student Course Registration</h1>
        <div id="user-info" class="hidden">
            <span id="welcome-message"></span>
            <button id="logout-btn">Logout</button>
        </div>
    </header>
    <main>
        <section id="auth-section" class="auth-container">
            <div class="auth-toggle">
                <button id="show-register" class="toggle-btn active">Register</button>
                <button id="show-login" class="toggle-btn">Log In</button>
            </div>

            <div id="register-box" class="auth-box">
                <h2>Create an Account</h2>
                <form id="register-form">
                    <input type="text" id="reg-name" placeholder="Full Name" required>
                    <input type="email" id="reg-email" placeholder="Email Address" required>
                    <button type="submit" class="primary-btn">Register</button>
                </form>
            </div>

            <div id="login-box" class="auth-box hidden">
                <h2>Welcome Back</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Email Address" required>
                    <button type="submit" class="primary-btn">Log In</button>
                </form>
            </div>
        </section>

        <div id="status-msg" class="status-container"></div>

        <section id="my-courses-section" class="hidden">
            <h2>My Registered Courses</h2>
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Credits</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="my-courses-body"></tbody>
            </table>
        </section>

        <section id="courses-section" class="hidden">
            <h2>Available Courses</h2>
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Credits</th>
                        <th>Seats</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="courses-body"></tbody>
            </table>
        </section>
    </main>
    <script src="app.js"></script>
</body>

</html>
